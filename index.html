<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<form id="dbmForm">
    <input type="text" name="full_name" placeholder="الاسم الكامل" required><br>
    <input type="text" name="role" placeholder="الصفة" required><br>
    <input type="text" name="restaurant_name" placeholder="اسم المنشأة" required><br>
    <input type="tel" name="phone_number" placeholder="رقم الجوال" required><br>
    <input type="email" name="email" placeholder="البريد الإلكتروني" required><br>
    <input type="text" name="city" placeholder="المدينة" required><br>
    <textarea name="challenges" placeholder="التحديات"></textarea><br>
    <button type="submit">إرسال البيانات</button>
</form>

<div id="status" style="margin-top:20px; font-weight:bold;"></div>

<script>
    // تهيئة الاتصال - تم التأكد من المفتاح العام
    const supabase = supabase.createClient('https://fhzrzfzabpyhyaxwibbv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZocnpmemFicHloeWF4d2liYnYiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc1MTU4NzM2MywiZXhwIjoyMDY3MTYzMzYzfQ.T_F7pS1fJgK_V2_F5bQeS_3Uv_iS0D059LqY3Q5Y7Qk');

    document.getElementById('dbmForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('status');
        status.innerText = 'جاري الإرسال...';
        status.style.color = 'blue';

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        const { error } = await supabase.from('leads').insert([data]);

        if (error) {
            status.style.color = 'red';
            status.innerText = 'خطأ: ' + error.message;
        } else {
            status.style.color = 'green';
            status.innerText = 'تم وصول البيانات بنجاح!';
            document.getElementById('dbmForm').reset();
        }
    });
</script>
</body>
</html>
