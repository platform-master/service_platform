<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل طلب اشتراك - DBM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .form-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; margin-top: 25px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>استمارة الطلب</h2>
    <form id="dbmForm">
        <label>الاسم</label>
        <input type="text" id="full_name" required>
        
        <label>الصفة</label>
        <select id="role">
            <option value="owner">مالك</option>
            <option value="manager">مدير</option>
            <option value="partner">شريك</option>
            <option value="other">أخرى</option>
        </select>

        <label>اسم المطعم</label>
        <input type="text" id="restaurant_name" required>
        
        <label>رقم الجوال</label>
        <input type="tel" id="phone_number" required>

        <label>البريد الإلكتروني</label>
        <input type="email" id="email" required>

        <label>المدينة</label>
        <input type="text" id="city" required>

        <label>أبرز التحديات الحالية</label>
        <textarea id="challenges" placeholder="اذكر أهم التحديات التي تواجهك..."></textarea>

        <button type="submit">إرسال الطلب</button>
    </form>
</div>

<script>
    const SUPABASE_URL = 'https://fhzrzfzabpyhyaxwibbv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoenJ6ZnphYnB5aHlheHdpYmJ2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjM0OTY0OCwiZXhwIjoyMDk3OTI1NjQ4fQ.nbzjga9Nv_5AI3v4GEBYM61-OFrLpRQj6CrUn4b7l94';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('dbmForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { error } = await supabase.from('leads').insert([
            { 
              full_name: document.getElementById('full_name').value,
              role: document.getElementById('role').value,
              restaurant_name: document.getElementById('restaurant_name').value,
              phone_number: document.getElementById('phone_number').value,
              email: document.getElementById('email').value,
              city: document.getElementById('city').value,
              challenges: document.getElementById('challenges').value
            }
        ]);
        if (error) alert('خطأ: ' + error.message);
        else { alert('تم استلام طلبك، شكراً لك!'); document.getElementById('dbmForm').reset(); }
    });
</script>
</body>
</html>
