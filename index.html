<!DOCTYPE html>
<html>
<head>
    <title>DBM System Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <form id="dbmForm">
        <input type="text" name="full_name" placeholder="الاسم الكامل" required><br>
        <input type="text" name="role" placeholder="الصفة" required><br>
        <input type="text" name="restaurant_name" placeholder="اسم المنشأة" required><br>
        <input type="tel" name="phone_number" placeholder="رقم الجوال" required><br>
        <input type="email" name="email" placeholder="البريد الإلكتروني" required><br>
        <input type="text" name="city" placeholder="المدينة" required><br>
        <textarea name="challenges" placeholder="التحديات"></textarea><br>
        <button type="submit" id="submitBtn">إرسال</button>
    </form>

    <script>
        // 1. الإعدادات التقنية
        const SUPABASE_URL = 'https://fhzrzfzabpyhyaxwibbv.supabase.co';
        const SUPABASE_KEY = 'JLzCqnbdefm6Si1UspgwMSmDCnLY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // 2. منطق الإرسال
        const form = document.getElementById('dbmForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'جاري الإرسال...';
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            const { error } = await supabase.from('leads').insert([data]);

            if (error) {
                alert('خطأ تقني: ' + error.message);
                btn.disabled = false;
                btn.innerText = 'إرسال';
            } else {
                alert('تم وصول البيانات بنجاح!');
                form.reset();
                btn.disabled = false;
                btn.innerText = 'إرسال';
            }
        });
    </script>
</body>
</html>
