<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سجّل اهتمامك</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 32px 28px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }
    h1 { font-size: 22px; margin-bottom: 8px; text-align: center; }
    p.sub { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 24px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #cbd5e1; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 13px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { background: #475569; cursor: not-allowed; }
    #msg {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    #msg.success { background: #064e3b; color: #6ee7b7; display: block; }
    #msg.error   { background: #7f1d1d; color: #fca5a5; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>سجّل اهتمامك</h1>
    <p class="sub">عبّي البيانات وراح نتواصل معك</p>

    <form id="leadForm">
      <label for="name">الاسم</label>
      <input id="name" name="name" type="text" required minlength="2" placeholder="اكتب اسمك" />

      <label for="phone">رقم الجوال</label>
      <input id="phone" name="phone" type="tel" required minlength="6" placeholder="05xxxxxxxx" />

      <button type="submit" id="submitBtn">إرسال</button>
      <div id="msg"></div>
    </form>
  </div>

  <script>
    const SUPABASE_URL  = 'https://fhzrzfzabpyhyaxwibbv.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoenJ6ZnphYnB5aHlheHdpYmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNDk2NDgsImV4cCI6MjA5NzkyNTY0OH0.vYysPXl1LuSJnhOULzCqnbdefm6Si1UspgwMSmDCnLY';

    const form  = document.getElementById('leadForm');
    const btn   = document.getElementById('submitBtn');
    const msg   = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name  = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();

      btn.disabled = true;
      btn.textContent = 'جاري الإرسال...';
      msg.className = '';
      msg.style.display = 'none';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/leads`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON,
            'Authorization': `Bearer ${SUPABASE_ANON}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ name, phone })
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(errText || 'فشل الإرسال');
        }

        msg.textContent = '✅ تم التسجيل بنجاح!';
        msg.className = 'success';
        form.reset();
      } catch (err) {
        msg.textContent = '❌ صار خطأ: ' + err.message;
        msg.className = 'error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'إرسال';
      }
    });
  </script>
</body>
</html>
